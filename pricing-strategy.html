<title>Viva Pricing Strategy Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --border: #2e3345;
    --text: #e4e6ed; --text-muted: #8b8fa3; --accent: #6366f1; --accent2: #818cf8;
    --green: #22c55e; --red: #ef4444; --yellow: #eab308; --orange: #f97316; --pink: #ec4899;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  header h1 { font-size:18px; font-weight:600; }
  header h1 span { color:var(--accent); }
  .subtitle { font-size:12px; color:var(--text-muted); }

  .controls { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
  .control-group { display:flex; flex-direction:column; gap:4px; }
  .control-group label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
  select { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:6px; font-size:12px; min-width:150px; cursor:pointer; }
  select:focus { outline:none; border-color:var(--accent); }

  main { padding:24px; max-width:1500px; margin:0 auto; }

  .summary-strip { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px,1fr)); gap:10px; margin-bottom:20px; }
  .summary-stat { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .summary-stat .label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:2px; }
  .summary-stat .val { font-size:20px; font-weight:700; }
  .summary-stat .sub { font-size:11px; color:var(--text-muted); margin-top:2px; }

  .product-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; overflow:hidden; }
  .product-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .product-name { font-size:15px; font-weight:700; }
  .product-meta { display:flex; gap:8px; align-items:center; }
  .tag { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; padding:3px 8px; border-radius:4px; }
  .tag-cat { background:rgba(99,102,241,0.1); color:var(--accent); }
  .tag-brand { background:rgba(236,72,153,0.1); color:var(--pink); }
  .product-body { padding:16px 20px; overflow-x:auto; }

  table.comp-table { width:100%; border-collapse:collapse; font-size:12px; }
  table.comp-table th { background:var(--surface2); padding:8px 12px; text-align:left; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); border-bottom:1px solid var(--border); white-space:nowrap; }
  table.comp-table td { padding:8px 12px; border-bottom:1px solid rgba(46,51,69,0.5); white-space:nowrap; font-variant-numeric:tabular-nums; }
  table.comp-table tr:last-child td { border-bottom:none; }
  table.comp-table tr:hover { background:rgba(99,102,241,0.03); }
  tr.viva-row { background:rgba(99,102,241,0.06); }
  tr.viva-row td { font-weight:600; color:var(--accent); }

  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; font-size:10px; font-weight:700; }
  .rank-1 { background:rgba(234,179,8,0.2); color:var(--yellow); }
  .rank-2 { background:rgba(192,192,192,0.15); color:#c0c0c0; }
  .rank-3 { background:rgba(205,127,50,0.15); color:#cd7f32; }
  .rank-4,.rank-5 { background:rgba(139,143,163,0.1); color:var(--text-muted); }

  .price-cheap { color:var(--green); font-weight:600; }
  .price-exp { color:var(--red); }
  .price-mid { color:var(--text); }

  .bar-wrap { width:120px; height:18px; background:var(--surface2); border-radius:3px; overflow:hidden; display:inline-block; vertical-align:middle; }
  .bar-fill { height:100%; border-radius:3px; transition:width 0.4s; }
  .bar-viva { background:var(--accent); }
  .bar-cheap { background:var(--green); }
  .bar-norm { background:var(--text-muted); opacity:0.35; }
  .bar-exp { background:var(--red); opacity:0.5; }

  .margin-good { color:var(--green); }
  .margin-tight { color:var(--yellow); }
  .margin-bad { color:var(--red); }

  .stats-row { display:flex; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .mini-stat { background:var(--surface2); border-radius:6px; padding:8px 12px; }
  .mini-stat .ms-label { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); }
  .mini-stat .ms-val { font-size:16px; font-weight:700; margin-top:1px; }
  .mini-stat .ms-sub { font-size:10px; color:var(--text-muted); }

  .note { font-size:11px; color:var(--text-muted); font-style:italic; }
  .comp-table a:hover { background:var(--accent); color:#fff !important; border-color:var(--accent) !important; }

  .vs-avg-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; font-variant-numeric:tabular-nums; }
  .vs-avg-badge.cheap { background:rgba(34,197,94,0.12); color:var(--green); }
  .vs-avg-badge.mid { background:rgba(234,179,8,0.12); color:var(--yellow); }
  .vs-avg-badge.expensive { background:rgba(239,68,68,0.12); color:var(--red); }
  .vs-avg-bar { width:40px; height:5px; border-radius:3px; display:inline-block; vertical-align:middle; }

  /* Tabs */
  .tab-bar { display:flex; gap:0; margin-right:auto; }
  .tab-btn { padding:8px 18px; font-size:12px; font-weight:600; color:var(--text-muted); background:transparent; border:1px solid var(--border); cursor:pointer; transition:all 0.2s; }
  .tab-btn:first-child { border-radius:6px 0 0 6px; }
  .tab-btn:last-child { border-radius:0 6px 6px 0; }
  .tab-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* Price Planner */
  .planner-wrap { display:none; }
  .planner-wrap.active { display:block; }
  .analysis-wrap { display:none; }
  .analysis-wrap.active { display:block; }

  .planner-actions { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
  .planner-actions button { font-size:12px; font-weight:600; padding:8px 16px; border-radius:6px; cursor:pointer; border:none; }
  .btn-save { background:var(--green); color:#fff; }
  .btn-save:hover { opacity:0.9; }
  .btn-reset { background:var(--surface2); color:var(--text-muted); border:1px solid var(--border) !important; }
  .btn-reset:hover { color:var(--text); }
  .planner-status { font-size:11px; color:var(--green); margin-left:8px; opacity:0; transition:opacity 0.3s; }
  .planner-status.show { opacity:1; }

  table.planner-table { width:100%; border-collapse:collapse; font-size:12px; background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
  table.planner-table th { background:var(--surface2); padding:10px 14px; text-align:left; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); border-bottom:1px solid var(--border); white-space:nowrap; }
  table.planner-table td { padding:8px 14px; border-bottom:1px solid rgba(46,51,69,0.5); white-space:nowrap; font-variant-numeric:tabular-nums; }
  table.planner-table tr:last-child td { border-bottom:none; }
  table.planner-table tr:hover { background:rgba(99,102,241,0.03); }
  table.planner-table input[type="number"] { width:80px; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:4px; font-size:12px; font-variant-numeric:tabular-nums; text-align:right; }
  table.planner-table input[type="number"]:focus { outline:none; border-color:var(--accent); }
  .planner-diff { font-size:11px; font-weight:600; }
  .planner-diff.up { color:var(--red); }
  .planner-diff.down { color:var(--green); }
  .planner-diff.same { color:var(--text-muted); }

  .planner-summary { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:10px; margin-bottom:16px; }
  .planner-summary .summary-stat .val-compare { display:flex; gap:8px; align-items:baseline; }
  .planner-summary .summary-stat .old-val { font-size:14px; color:var(--text-muted); text-decoration:line-through; }
  .planner-summary .summary-stat .arrow { font-size:14px; color:var(--text-muted); }

  @media (max-width:768px) {
    .controls { flex-direction:column; }
    .summary-strip { grid-template-columns:repeat(2,1fr); }
    .bar-wrap { width:60px; }
    select { min-width:100%; }
    .overview-label { width:120px; min-width:120px; font-size:11px; }
    .tab-bar { width:100%; }
    .tab-btn { flex:1; text-align:center; }
    table.planner-table input[type="number"] { width:65px; }
  }
</style>
</head>

  </div>
</header>

<div class="controls">

    <button class="tab-btn active" onclick="switchTab('analysis')">Analysis</button>

  </div>
  <div class="control-group" id="ctrl-category">
    <label>Category</label>
    <select id="fCategory"><option value="all">All Categories</option></select>
  </div>
  <div class="control-group" id="ctrl-product">
    <label>Product</label>
    <select id="fProduct"><option value="all">All Products</option></select>
  </div>
  <div class="control-group" id="ctrl-strength">
    <label>Strength</label>
    <select id="fStrength"><option value="all">All Strengths</option></select>
  </div>
  <div class="control-group" id="ctrl-pack">
    <label>Pack Size</label>
    <select id="fPack"><option value="all">All Pack Sizes</option></select>
  </div>
</div>

<main>

    <div class="summary-strip" id="summaryStrip"></div>
    <div id="products"></div>
  </div>
  <div class="planner-wrap" id="plannerView">

      <span class="planner-status" id="plannerStatus">Saved!</span>
    </div>
    <table class="planner-table" id="plannerTable"></table>

</main>

// --- UTILITY ---
function fmt(v) { return v == null ? '-' : '\u00A3' + v.toFixed(2); }
function pct(v) { return v == null ? '-' : (v > 0 ? '+' : '') + v.toFixed(0) + '%'; }

function getStats(item) {
  const prices = item.competitors.filter(c => c.price != null).map(c => c.price);
  if (!prices.length) return { avg:null, median:null, min:null, max:null, position:null, count:0, total:item.competitors.length };
  const s = [...prices].sort((a,b)=>a-b);
  const avg = prices.reduce((a,b)=>a+b,0)/prices.length;
  const med = s.length%2===0 ? (s[s.length/2-1]+s[s.length/2])/2 : s[Math.floor(s.length/2)];
  let pos = null;
  if (item.vivaPrice != null) { const all=[...prices,item.vivaPrice].sort((a,b)=>a-b); pos=all.indexOf(item.vivaPrice)+1; }
  return { avg, median:med, min:s[0], max:s[s.length-1], position:pos, count:prices.length, total:item.competitors.length, prices };
}

// --- FILTERS (bidirectional) ---
const FILTER_IDS = ['fBrand','fCategory','fProduct','fStrength','fPack'];
const FILTER_KEYS = { fBrand:'brand', fCategory:'category', fProduct:'product', fStrength:'strength', fPack:'packSize' };

function populateFilters() { syncFilters(); }

function fillSel(id, vals, keepVal) {
  const el = document.getElementById(id);
  const label = el.options[0].textContent;
  const prev = keepVal || el.value;
  el.innerHTML = '';
  const all = document.createElement('option'); all.value='all'; all.textContent=label; el.appendChild(all);
  vals.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; el.appendChild(o); });
  // Restore selection if still valid, otherwise reset to all
  if (prev !== 'all' && vals.includes(prev)) el.value = prev; else el.value = 'all';
}

function syncFilters(changedId) {
  // Get current values
  const vals = {};
  FILTER_IDS.forEach(id => vals[id] = document.getElementById(id).value);

  // Apply all active filters to get the matching dataset
  let filtered = DATA;
  FILTER_IDS.forEach(id => {
    if (vals[id] !== 'all') filtered = filtered.filter(d => d[FILTER_KEYS[id]] === vals[id]);
  });

  // For each filter, show only options compatible with ALL OTHER active filters
  FILTER_IDS.forEach(id => {
    if (id === changedId) return; // don't rebuild the one the user just changed
    let pool = DATA;
    FILTER_IDS.forEach(otherId => {
      if (otherId === id) return; // exclude self
      if (vals[otherId] !== 'all') pool = pool.filter(d => d[FILTER_KEYS[otherId]] === vals[otherId]);
    });
    const options = [...new Set(pool.map(d => d[FILTER_KEYS[id]]))];
    fillSel(id, options);
  });

  // Auto-select if only one option remains
  FILTER_IDS.forEach(id => {
    const el = document.getElementById(id);
    if (el.options.length === 2 && el.value === 'all') el.value = el.options[1].value;
  });
}

function getFiltered() {
  let items = DATA;
  const brand = document.getElementById('fBrand').value;
  const cat = document.getElementById('fCategory').value;
  const prod = document.getElementById('fProduct').value;
  const str = document.getElementById('fStrength').value;
  const pack = document.getElementById('fPack').value;
  if (brand!=='all') items=items.filter(d=>d.brand===brand);
  if (cat!=='all') items=items.filter(d=>d.category===cat);
  if (prod!=='all') items=items.filter(d=>d.product===prod);
  if (str!=='all') items=items.filter(d=>d.strength===str);
  if (pack!=='all') items=items.filter(d=>d.packSize===pack);
  return items;
}

// --- RENDER ---
function render() {
  const items = getFiltered();
  renderSummary(items);
  renderProducts(items);
}

function renderSummary(items) {
  const proposed = loadProposed();
  const hasProposed = Object.keys(proposed).length > 0;

  function getPrice(i) { return effectivePrice(i); }

  const withStats = items.filter(i=>getPrice(i) && getStats(i).avg);
  let totalDiff=0, totalCompared=0;
  withStats.forEach(i => {
    const s=getStats(i);
    if(s.avg) { totalDiff += (getPrice(i)/s.avg - 1)*100; totalCompared++; }
  });
  const avgDiff = totalCompared ? totalDiff/totalCompared : 0;
  const margItems = items.filter(i=>getPrice(i)&&i.costPrice);
  const avgMargin = margItems.reduce((acc,i)=>{
    const p = getPrice(i);
    return acc + ((p-i.costPrice)/p*100);
  },0) / (margItems.length||1);

  const compRows = items.filter(i => getPrice(i) && getStats(i).avg);
  const belowAvg = compRows.filter(i => getPrice(i) < getStats(i).avg).length;
  const compScore = compRows.length ? Math.round((belowAvg / compRows.length) * 100) : 0;
  const scoreColor = compScore >= 60 ? 'var(--green)' : compScore >= 40 ? 'var(--yellow)' : 'var(--red)';

  const proposedLabel = hasProposed ? ' <span style="font-size:9px;color:var(--accent);font-weight:600;vertical-align:super">PROPOSED</span>' : '';

  document.getElementById('summaryStrip').innerHTML = `
    <div class="summary-stat"><div class="label">Competitiveness${proposedLabel}</div><div class="val" style="color:${scoreColor}">${compScore}/100</div><div class="sub">${belowAvg} of ${compRows.length} below avg</div></div>
    <div class="summary-stat"><div class="label">Avg vs Market${proposedLabel}</div><div class="val" style="color:${avgDiff>10?'var(--red)':avgDiff<-10?'var(--green)':'var(--yellow)'}">${pct(avgDiff)}</div><div class="sub">${avgDiff>0?'Above':'Below'} avg competitor price</div></div>
    <div class="summary-stat"><div class="label">Avg Gross Margin${proposedLabel}</div><div class="val" style="color:${avgMargin>30?'var(--green)':avgMargin>15?'var(--yellow)':'var(--red)'}">${avgMargin.toFixed(0)}%</div><div class="sub">Based on cost (inc. VAT)</div></div>
    <div class="summary-stat"><div class="label">Products</div><div class="val">${items.length}</div></div>
  `;
}

function renderProducts(items) {
  const container = document.getElementById('products');
  let html = '';

  items.forEach(item => {
    const stats = getStats(item);
    const price = effectivePrice(item);
    const isProposed = price !== item.vivaPrice;
    const margin = (price && item.costPrice) ? ((price - item.costPrice) / price * 100) : null;
    const marginClass = margin > 40 ? 'margin-good' : margin > 15 ? 'margin-tight' : 'margin-bad';
    const maxP = Math.max(...item.competitors.filter(c=>c.price).map(c=>c.price), price||0);

    // vs avg badge
    let vsAvgHtml = '';
    if (price && stats.avg) {
      const d = ((price / stats.avg) - 1) * 100;
      const cls = d < -10 ? 'cheap' : d > 10 ? 'expensive' : 'mid';
      const barColor = d < -10 ? 'var(--green)' : d > 10 ? 'var(--red)' : 'var(--yellow)';
      vsAvgHtml = `<span class="vs-avg-badge ${cls}"><span class="vs-avg-bar" style="background:${barColor};width:${Math.min(Math.abs(d),50)}px"></span>${d>0?'+':''}${d.toFixed(0)}% vs avg</span>`;
    }

    const proposedTag = isProposed ? ' <span style="font-size:9px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:3px;vertical-align:middle">PROPOSED</span>' : '';

    html += `<div class="product-card">`;
    html += `<div class="product-header"><div><span class="product-name">${item.product} ${item.strength}</span> <span style="color:var(--text-muted);font-size:12px;margin-left:6px">${item.packSize}</span> ${vsAvgHtml}${proposedTag}</div>`;
    html += `<div class="product-meta"><span class="tag tag-brand">${item.brand}</span><span class="tag tag-cat">${item.category}</span></div></div>`;
    html += `<div class="product-body">`;

    // Table
    html += `<table class="comp-table"><thead><tr>`;
    html += `<th></th><th>Rank</th><th>Price</th><th>vs Bar</th><th>Cost</th><th>Margin</th><th></th>`;
    html += `</tr></thead><tbody>`;

    // Viva row
    html += `<tr class="viva-row">`;
    html += `<td style="font-weight:700">${item.brand}${isProposed ? ' <span style="font-size:9px;color:var(--accent)">(was '+fmt(item.vivaPrice)+')</span>' : ''}</td>`;
    html += `<td style="font-size:11px">YOU</td>`;
    html += `<td style="font-weight:700">${price ? fmt(price) : 'N/A'}</td>`;
    html += `<td>${maxP && price ? `<div class="bar-wrap"><div class="bar-fill bar-viva" style="width:${price/maxP*100}%"></div></div>` : ''}</td>`;
    html += `<td style="color:var(--orange);font-size:11px">${item.costPrice ? fmt(item.costPrice) : '-'}</td>`;
    html += `<td class="${marginClass}" style="font-weight:700">${margin != null ? margin.toFixed(0)+'%' : '-'}</td>`;
    html += `<td></td>`;
    html += `</tr>`;

    // Competitors sorted by price
    const sorted = [...item.competitors].sort((a,b)=>(a.price||Infinity)-(b.price||Infinity));
    sorted.forEach(c => {
      const isCheap = c.price === stats.min;
      const isExp = c.price === stats.max && stats.count > 1;
      const cls = isCheap ? 'price-cheap' : isExp ? 'price-exp' : 'price-mid';
      const barCls = isCheap ? 'bar-cheap' : isExp ? 'bar-exp' : 'bar-norm';
      html += `<tr>`;
      html += `<td><span class="rank-badge rank-${c.rank}">${c.rank}</span> ${c.name}</td>`;
      html += `<td style="font-size:11px;color:var(--text-muted)">#${c.rank}</td>`;
      html += `<td class="${cls}">${c.price ? fmt(c.price) : `<span class="note">${c.note||'N/A'}</span>`}</td>`;
      html += `<td>${maxP && c.price ? `<div class="bar-wrap"><div class="bar-fill ${barCls}" style="width:${c.price/maxP*100}%"></div></div>` : ''}</td>`;
      html += `<td></td><td></td>`;
      html += `<td>${c.url ? `<a href="${c.url}" target="_blank" rel="noopener" style="font-size:10px;color:var(--accent);text-decoration:none;padding:2px 8px;border:1px solid var(--border);border-radius:4px;white-space:nowrap">View</a>` : ''}</td>`;
      html += `</tr>`;
    });

    html += `</tbody></table>`;

    // Stats strip
    html += `<div class="stats-row">`;
    html += `<div class="mini-stat"><div class="ms-label">Cheapest</div><div class="ms-val" style="color:var(--green)">${stats.min?fmt(stats.min):'TBD'}</div></div>`;
    html += `<div class="mini-stat"><div class="ms-label">Average</div><div class="ms-val">${stats.avg?fmt(stats.avg):'TBD'}</div></div>`;
    html += `<div class="mini-stat"><div class="ms-label">Median</div><div class="ms-val">${stats.median?fmt(stats.median):'TBD'}</div></div>`;
    if (price && stats.avg) {
      const d=((price/stats.avg-1)*100);
      html += `<div class="mini-stat"><div class="ms-label">Viva vs Avg</div><div class="ms-val" style="color:${d>10?'var(--red)':d<-10?'var(--green)':'var(--yellow)'}">${pct(d)}</div></div>`;
    }
    if (price && stats.prices) {
      const allPrices = [...stats.prices, price].sort((a,b)=>a-b);
      const pos = allPrices.indexOf(price) + 1;
      const pcls = pos<=2?'var(--green)':pos<=4?'var(--yellow)':'var(--red)';
      html += `<div class="mini-stat"><div class="ms-label">Price Rank</div><div class="ms-val" style="color:${pcls}">#${pos} of ${allPrices.length}</div></div>`;
    }
    if (item.costPrice && price) {
      const profit = price - item.costPrice;
      html += `<div class="mini-stat"><div class="ms-label">Profit / Sale</div><div class="ms-val" style="color:${profit>5?'var(--green)':'var(--red)'}">${fmt(profit)}</div></div>`;
    }
    html += `</div>`;

    html += `</div></div>`;
  });

  container.innerHTML = html || '<p style="color:var(--text-muted);padding:40px;text-align:center">No products match current filters.</p>';
}

// --- PROPOSED PRICES (localStorage) ---
const LS_KEY = 'viva-proposed-prices';
function loadProposed() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; }
}
function saveProposed(map) { localStorage.setItem(LS_KEY, JSON.stringify(map)); }
function getItemKey(item) { return `${item.product}|${item.strength}|${item.packSize}`; }

// Get effective price (proposed if set, otherwise vivaPrice)
function effectivePrice(item) {
  const proposed = loadProposed();
  const key = getItemKey(item);
  return (proposed[key] != null && proposed[key] !== '') ? proposed[key] : item.vivaPrice;
}

// --- TAB SWITCHING ---
let currentTab = 'analysis';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='analysis') || (i===1 && tab==='planner')));
  document.getElementById('analysisView').classList.toggle('active', tab==='analysis');
  document.getElementById('plannerView').classList.toggle('active', tab==='planner');
  // Show/hide filters (only for analysis)
  ['ctrl-brand','ctrl-category','ctrl-product','ctrl-strength','ctrl-pack'].forEach(id => {
    document.getElementById(id).style.display = tab==='analysis' ? '' : 'none';
  });
  if (tab==='analysis') render();
  if (tab==='planner') renderPlanner();
}

// --- PLANNER ---
function renderPlanner() {
  const items = DATA;
  const proposed = loadProposed();

  // Planner summary: compare current vs proposed overall stats
  renderPlannerSummary(items, proposed);

  let html = '<thead><tr>';
  html += '<th>Product</th><th>Strength</th><th>Pack Size</th><th>Category</th>';
  html += '<th>Cost</th><th>Current Price</th><th>Proposed Price</th>';
  html += '<th>Change</th><th>New Margin</th><th>New vs Avg</th>';
  html += '</tr></thead><tbody>';

  items.forEach((item, idx) => {
    const key = getItemKey(item);
    const proposedVal = proposed[key] != null ? proposed[key] : '';
    const currentP = item.vivaPrice;
    const cost = item.costPrice || 0;
    const stats = getStats(item);

    // Calculate proposed metrics
    const propP = proposedVal !== '' ? parseFloat(proposedVal) : currentP;
    const newMargin = (propP && cost) ? ((propP - cost) / propP * 100) : null;
    const newVsAvg = (propP && stats.avg) ? ((propP / stats.avg - 1) * 100) : null;
    const priceDiff = (proposedVal !== '' && currentP) ? ((propP - currentP) / currentP * 100) : null;

    const marginCls = newMargin > 40 ? 'margin-good' : newMargin > 15 ? 'margin-tight' : 'margin-bad';
    const vsAvgCls = newVsAvg !== null ? (newVsAvg < -10 ? 'style="color:var(--green)"' : newVsAvg > 10 ? 'style="color:var(--red)"' : 'style="color:var(--yellow)"') : '';
    const diffCls = priceDiff !== null ? (priceDiff > 0 ? 'up' : priceDiff < 0 ? 'down' : 'same') : 'same';

    html += `<tr>`;
    html += `<td style="font-weight:600">${item.product}</td>`;
    html += `<td>${item.strength}</td>`;
    html += `<td>${item.packSize}</td>`;
    html += `<td><span class="tag tag-cat" style="font-size:9px">${item.category}</span></td>`;
    html += `<td style="color:var(--orange)">${cost ? fmt(cost) : '-'}</td>`;
    html += `<td>${currentP ? fmt(currentP) : 'N/A'}</td>`;
    html += `<td><input type="number" step="0.01" min="0" data-idx="${idx}" data-key="${key}" value="${proposedVal}" placeholder="${currentP||''}" oninput="onPlannerInput(this)"></td>`;
    html += `<td><span class="planner-diff ${diffCls}">${priceDiff !== null ? (priceDiff > 0 ? '+' : '') + priceDiff.toFixed(1) + '%' : '-'}</span></td>`;
    html += `<td class="${marginCls}">${newMargin !== null ? newMargin.toFixed(0) + '%' : '-'}</td>`;
    html += `<td ${vsAvgCls}>${newVsAvg !== null ? (newVsAvg > 0 ? '+' : '') + newVsAvg.toFixed(0) + '% vs avg' : '-'}</td>`;
    html += `</tr>`;
  });

  html += '</tbody>';
  document.getElementById('plannerTable').innerHTML = html;
}

function renderPlannerSummary(items, proposed) {
  // Current stats
  const currentStats = calcOverallStats(items, false);
  // Proposed stats (use proposed where available)
  const proposedStats = calcOverallStats(items, true);
  const hasProposed = Object.keys(proposed).length > 0;

  let html = '';

  // Competitiveness
  const curScoreColor = currentStats.compScore >= 60 ? 'var(--green)' : currentStats.compScore >= 40 ? 'var(--yellow)' : 'var(--red)';
  const newScoreColor = proposedStats.compScore >= 60 ? 'var(--green)' : proposedStats.compScore >= 40 ? 'var(--yellow)' : 'var(--red)';
  html += `<div class="summary-stat"><div class="label">Competitiveness</div>`;
  if (hasProposed && proposedStats.compScore !== currentStats.compScore) {
    html += `<div class="val-compare"><span class="old-val">${currentStats.compScore}/100</span><span class="arrow">&rarr;</span><span class="val" style="color:${newScoreColor};font-size:20px">${proposedStats.compScore}/100</span></div>`;
  } else {
    html += `<div class="val" style="color:${curScoreColor}">${currentStats.compScore}/100</div>`;
  }
  html += `</div>`;

  // Avg vs Market
  const curDiffColor = currentStats.avgDiff > 10 ? 'var(--red)' : currentStats.avgDiff < -10 ? 'var(--green)' : 'var(--yellow)';
  const newDiffColor = proposedStats.avgDiff > 10 ? 'var(--red)' : proposedStats.avgDiff < -10 ? 'var(--green)' : 'var(--yellow)';
  html += `<div class="summary-stat"><div class="label">Avg vs Market</div>`;
  if (hasProposed && Math.abs(proposedStats.avgDiff - currentStats.avgDiff) > 0.5) {
    html += `<div class="val-compare"><span class="old-val">${pct(currentStats.avgDiff)}</span><span class="arrow">&rarr;</span><span class="val" style="color:${newDiffColor};font-size:20px">${pct(proposedStats.avgDiff)}</span></div>`;
  } else {
    html += `<div class="val" style="color:${curDiffColor}">${pct(currentStats.avgDiff)}</div>`;
  }
  html += `</div>`;

  // Avg Margin
  const curMarginColor = currentStats.avgMargin > 30 ? 'var(--green)' : currentStats.avgMargin > 15 ? 'var(--yellow)' : 'var(--red)';
  const newMarginColor = proposedStats.avgMargin > 30 ? 'var(--green)' : proposedStats.avgMargin > 15 ? 'var(--yellow)' : 'var(--red)';
  html += `<div class="summary-stat"><div class="label">Avg Gross Margin</div>`;
  if (hasProposed && Math.abs(proposedStats.avgMargin - currentStats.avgMargin) > 0.5) {
    html += `<div class="val-compare"><span class="old-val">${currentStats.avgMargin.toFixed(0)}%</span><span class="arrow">&rarr;</span><span class="val" style="color:${newMarginColor};font-size:20px">${proposedStats.avgMargin.toFixed(0)}%</span></div>`;
  } else {
    html += `<div class="val" style="color:${curMarginColor}">${currentStats.avgMargin.toFixed(0)}%</div>`;
  }
  html += `</div>`;

  // Products with proposed prices
  const proposedCount = Object.values(proposed).filter(v => v !== '' && v != null).length;
  html += `<div class="summary-stat"><div class="label">Proposed Prices Set</div><div class="val">${proposedCount} <span style="font-size:13px;color:var(--text-muted)">/ ${items.length}</span></div></div>`;

  document.getElementById('plannerSummary').innerHTML = html;
}

function calcOverallStats(items, useProposed) {
  const proposed = useProposed ? loadProposed() : {};
  let totalDiff = 0, totalCompared = 0, belowAvg = 0, compTotal = 0;
  let totalMargin = 0, marginCount = 0;

  items.forEach(item => {
    const key = getItemKey(item);
    const price = (useProposed && proposed[key] != null && proposed[key] !== '') ? parseFloat(proposed[key]) : item.vivaPrice;
    const stats = getStats(item);
    if (price && stats.avg) {
      totalDiff += (price / stats.avg - 1) * 100;
      totalCompared++;
      if (price < stats.avg) belowAvg++;
      compTotal++;
    }
    if (price && item.costPrice) {
      totalMargin += (price - item.costPrice) / price * 100;
      marginCount++;
    }
  });

  return {
    compScore: compTotal ? Math.round((belowAvg / compTotal) * 100) : 0,
    avgDiff: totalCompared ? totalDiff / totalCompared : 0,
    avgMargin: marginCount ? totalMargin / marginCount : 0
  };
}

function onPlannerInput(el) {
  // Live update the row
  const idx = parseInt(el.dataset.idx);
  const item = DATA[idx];
  const val = el.value.trim();
  const propP = val !== '' ? parseFloat(val) : item.vivaPrice;
  const cost = item.costPrice || 0;
  const stats = getStats(item);
  const row = el.closest('tr');
  const cells = row.querySelectorAll('td');

  // Change column
  if (val !== '' && item.vivaPrice) {
    const diff = ((propP - item.vivaPrice) / item.vivaPrice * 100);
    const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'same';
    cells[7].innerHTML = `<span class="planner-diff ${cls}">${diff > 0 ? '+' : ''}${diff.toFixed(1)}%</span>`;
  } else {
    cells[7].innerHTML = '<span class="planner-diff same">-</span>';
  }

  // Margin column
  const newMargin = (propP && cost) ? ((propP - cost) / propP * 100) : null;
  const marginCls = newMargin > 40 ? 'margin-good' : newMargin > 15 ? 'margin-tight' : 'margin-bad';
  cells[8].className = marginCls;
  cells[8].textContent = newMargin !== null ? newMargin.toFixed(0) + '%' : '-';

  // vs Avg column
  const newVsAvg = (propP && stats.avg) ? ((propP / stats.avg - 1) * 100) : null;
  cells[9].style.color = newVsAvg !== null ? (newVsAvg < -10 ? 'var(--green)' : newVsAvg > 10 ? 'var(--red)' : 'var(--yellow)') : '';
  cells[9].textContent = newVsAvg !== null ? (newVsAvg > 0 ? '+' : '') + newVsAvg.toFixed(0) + '% vs avg' : '-';

  // Live-update summary with temporary proposed map
  const proposed = loadProposed();
  const key = el.dataset.key;
  if (val !== '') proposed[key] = parseFloat(val); else delete proposed[key];
  renderPlannerSummary(DATA, proposed);
}

function savePlanner() {
  const proposed = {};
  document.querySelectorAll('#plannerTable input[type="number"]').forEach(el => {
    if (el.value.trim() !== '') {
      proposed[el.dataset.key] = parseFloat(el.value);
    }
  });
  saveProposed(proposed);
  const status = document.getElementById('plannerStatus');
  status.classList.add('show');
  setTimeout(() => status.classList.remove('show'), 2000);
}

function resetPlanner() {
  if (!confirm('Reset all proposed prices?')) return;
  localStorage.removeItem(LS_KEY);
  renderPlanner();
}

populateFilters();
render();

// --- EXPORT XLSX ---
function exportXLSX() {
  const btn = document.getElementById('exportBtn');
  btn.textContent = 'Loading...';
  btn.disabled = true;

  // Load SheetJS if not already loaded
  if (typeof XLSX === 'undefined') {
    const s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
    s.onload = () => doExport();
    s.onerror = () => { btn.textContent = 'Export XLSX'; btn.disabled = false; alert('Failed to load XLSX library. Check your internet connection.'); };
    document.head.appendChild(s);
  } else {
    doExport();
  }

  function doExport() {
    try {
      const items = getFiltered();
      const rows = [];

      const proposed = loadProposed();
      items.forEach(item => {
        const stats = getStats(item);
        const price = effectivePrice(item);
        const isProposed = price !== item.vivaPrice;
        const margin = (price && item.costPrice) ? ((price - item.costPrice) / price * 100) : null;
        const minViable = item.costPrice ? item.costPrice * 1.1 : null;

        // Viva row
        rows.push({
          Brand: item.brand,
          Category: item.category,
          Product: item.product,
          Strength: item.strength,
          'Pack Size': item.packSize,
          Competitor: item.brand + ' (YOU)',
          'SEO Rank': '-',
          Price: price,
          'Proposed': isProposed ? price : '',
          'Original Price': isProposed ? item.vivaPrice : '',
          'Cost Price': item.costPrice || '',
          'Margin %': margin ? +margin.toFixed(1) : '',
          'Min Viable (10%)': minViable ? +minViable.toFixed(2) : '',
          'Cheapest Competitor': stats.min || '',
          'Avg Competitor': stats.avg ? +stats.avg.toFixed(2) : '',
          'Median Competitor': stats.median ? +stats.median.toFixed(2) : '',
          'Price Rank': stats.position ? stats.position + ' of ' + (stats.count + 1) : '',
          'Profit / Sale': (item.vivaPrice && item.costPrice) ? +(item.vivaPrice - item.costPrice).toFixed(2) : ''
        });

        // Competitor rows
        item.competitors.forEach(c => {
          rows.push({
            Brand: item.brand,
            Category: item.category,
            Product: item.product,
            Strength: item.strength,
            'Pack Size': item.packSize,
            Competitor: c.name,
            'SEO Rank': c.rank,
            Price: c.price || (c.note || 'N/A'),
            'Cost Price': '',
            'Margin %': '',
            'Min Viable (10%)': '',
            'Cheapest Competitor': '',
            'Avg Competitor': '',
            'Median Competitor': '',
            'Price Rank': '',
            'Profit / Sale': ''
          });
        });
      });

      const ws = XLSX.utils.json_to_sheet(rows);

      // Column widths
      ws['!cols'] = [
        {wch:10},{wch:20},{wch:22},{wch:10},{wch:18},{wch:28},{wch:9},{wch:10},
        {wch:10},{wch:10},{wch:14},{wch:16},{wch:14},{wch:16},{wch:12},{wch:12}
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Pricing Strategy');
      XLSX.writeFile(wb, 'viva-pricing-strategy.xlsx');
    } catch(e) {
      alert('Export failed: ' + e.message);
    }
    btn.textContent = 'Export XLSX';
    btn.disabled = false;
  }
}
</script>

      style="width:100%;padding:12px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;"
      onmouseover="this.style.background='#818cf8'" onmouseout="this.style.background='#6366f1'">Unlock</button>

</div>
<script>
(function(){
  const HASH='607e635aa1d4c6efa2d41cd65ab15806d5205df5783b17dd678b6d55042632ba';
  const KEY='vmprice_auth';
  if(localStorage.getItem(KEY)===HASH){document.getElementById('authGate').style.display='none';}
  window.checkAuth=async function(){
    const pw=document.getElementById('authPass').value;
    const enc=new TextEncoder();
    const buf=await crypto.subtle.digest('SHA-256',enc.encode(pw));
    const hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(hash===HASH){localStorage.setItem(KEY,HASH);document.getElementById('authGate').style.display='none';}
    else{const e=document.getElementById('authError');e.style.display='block';document.getElementById('authPass').value='';document.getElementById('authPass').focus();}
  };
})();
</script>
