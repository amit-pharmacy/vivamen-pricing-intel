<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --border: #2e3345;

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  header { background:var(--surface); border-bottom:1px solid var(--border); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
  header h1 { font-size:18px; font-weight:600; }
  header h1 span { color:var(--accent); }
  .subtitle { font-size:12px; color:var(--text-muted); }
  .controls { background:var(--surface); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .filter-btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--surface2); color:var(--text-muted); font-size:12px; cursor:pointer; transition:all 0.15s; }
  .filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(99,102,241,0.1); }
  .filter-btn:hover { border-color:var(--accent2); color:var(--text); }
  main { padding:24px; max-width:1400px; margin:0 auto; }

  .product-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
  .product-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
  .product-name { font-size:16px; font-weight:700; }
  .product-category { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; padding:3px 8px; border-radius:4px; background:rgba(99,102,241,0.1); color:var(--accent); }
  .product-body { padding:16px 20px; }

  .price-row { display:grid; grid-template-columns: 180px 100px 100px 1fr 80px 80px 100px; align-items:center; padding:8px 0; border-bottom:1px solid rgba(46,51,69,0.5); font-size:13px; gap:8px; }
  .price-row.header { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:4px; }
  .price-row:last-child { border-bottom:none; }

  .comp-name { font-weight:500; display:flex; align-items:center; gap:6px; }
  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; font-size:10px; font-weight:700; flex-shrink:0; }
  .rank-1 { background:rgba(234,179,8,0.2); color:var(--yellow); }
  .rank-2 { background:rgba(139,143,163,0.15); color:var(--text-muted); }
  .rank-3 { background:rgba(168,85,247,0.15); color:#a855f7; }
  .rank-4 { background:rgba(99,102,241,0.1); color:var(--accent); }
  .rank-5 { background:rgba(139,143,163,0.1); color:var(--text-muted); }

  .price { font-weight:600; font-variant-numeric:tabular-nums; }
  .price.cheapest { color:var(--green); }
  .price.expensive { color:var(--red); }
  .price.mid { color:var(--text); }

  .viva-row { background:rgba(99,102,241,0.06); border-radius:6px; margin:4px -8px; padding:8px !important; }
  .viva-row .comp-name { color:var(--accent); font-weight:700; }

  .bar-container { height:24px; background:var(--surface2); border-radius:4px; position:relative; overflow:hidden; }
  .bar { height:100%; border-radius:4px; min-width:2px; transition:width 0.5s; }
  .bar.viva { background:var(--accent); }
  .bar.cheap { background:var(--green); }
  .bar.normal { background:var(--text-muted); opacity:0.4; }
  .bar.expensive { background:var(--red); opacity:0.6; }

  .stats-row { display:flex; gap:16px; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); flex-wrap:wrap; }
  .stat { background:var(--surface2); border-radius:8px; padding:10px 14px; min-width:120px; }
  .stat .label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); margin-bottom:2px; }
  .stat .value { font-size:18px; font-weight:700; }
  .stat .value.green { color:var(--green); }
  .stat .value.red { color:var(--red); }
  .stat .value.accent { color:var(--accent); }
  .stat .value.yellow { color:var(--yellow); }
  .stat .sub { font-size:11px; color:var(--text-muted); }

  .position-tag { font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; }
  .pos-good { background:rgba(34,197,94,0.15); color:var(--green); }
  .pos-ok { background:rgba(234,179,8,0.15); color:var(--yellow); }
  .pos-bad { background:rgba(239,68,68,0.15); color:var(--red); }

  .legend { display:flex; gap:16px; margin-bottom:20px; font-size:12px; color:var(--text-muted); flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; }
  .legend-dot { width:10px; height:10px; border-radius:50%; }

  .summary-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:16px; }
  .summary-table th { background:var(--surface2); padding:10px 14px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-muted); border:1px solid var(--border); }
  .summary-table td { padding:10px 14px; border:1px solid var(--border); font-variant-numeric:tabular-nums; }
  .summary-table tr:hover { background:rgba(99,102,241,0.03); }

  }

function fmt(v) {
  if (v == null) return '-';
  return '\u00A3' + v.toFixed(2);
}

function getStats(item) {
  const prices = item.competitors.filter(c => c.price != null).map(c => c.price);
  if (prices.length === 0) return { avg: null, median: null, min: null, max: null, position: null };
  const sorted = [...prices].sort((a,b) => a-b);
  const avg = prices.reduce((a,b) => a+b, 0) / prices.length;
  const median = sorted.length % 2 === 0 ? (sorted[sorted.length/2-1] + sorted[sorted.length/2]) / 2 : sorted[Math.floor(sorted.length/2)];
  const min = sorted[0];
  const max = sorted[sorted.length-1];
  let position = null;
  if (item.vivaPrice != null) {
    const all = [...prices, item.vivaPrice].sort((a,b) => a-b);
    position = all.indexOf(item.vivaPrice) + 1;
  }
  return { avg, median, min, max, position, count: prices.length, total: item.competitors.length };
}

    const posClass = stats.position != null ? (stats.position <= 2 ? 'pos-good' : stats.position <= 4 ? 'pos-ok' : 'pos-bad') : '';
    const posText = stats.position != null ? `${stats.position} of ${stats.count + 1}` : '-';

    html += `<div class="price-row viva-row">`;
    html += `<div class="comp-name">${item.brand}</div>`;
    html += `<div style="color:var(--accent);font-size:11px">YOU</div>`;
    html += `<div class="price" style="color:var(--accent)">${item.vivaPrice ? fmt(item.vivaPrice) : (item.note || 'N/A')}</div>`;
    html += `<div>`;
    if (maxPrice && item.vivaPrice) {
      const pct = (item.vivaPrice / maxPrice * 100);
      html += `<div class="bar-container"><div class="bar viva" style="width:${pct}%"></div></div>`;
    }
    html += `</div>`;
    html += `<div class="hide-mobile" style="font-size:12px;color:var(--text-muted)">${stats.avg ? fmt(stats.avg) : '-'}</div>`;
    html += `<div class="hide-mobile" style="font-size:12px;color:var(--text-muted)">${stats.median ? fmt(stats.median) : '-'}</div>`;
    html += `<div><span class="position-tag ${posClass}">${posText}</span></div>`;
    html += `</div>`;

    // Competitor rows
    const sortedComps = [...item.competitors].sort((a,b) => (a.price||Infinity) - (b.price||Infinity));
    sortedComps.forEach(comp => {
      const isCheapest = comp.price === stats.min;
      const isExpensive = comp.price === stats.max && stats.count > 1;
      const priceClass = isCheapest ? 'cheapest' : isExpensive ? 'expensive' : 'mid';
      const barClass = isCheapest ? 'cheap' : isExpensive ? 'expensive' : 'normal';

      html += `<div class="price-row">`;
      html += `<div class="comp-name"><span class="rank-badge rank-${comp.rank}">${comp.rank}</span> ${comp.name}</div>`;
      html += `<div style="font-size:11px;color:var(--text-muted)">#${comp.rank} on Google</div>`;
      html += `<div class="price ${priceClass}">${comp.price ? fmt(comp.price) : `<span style="font-size:11px;color:var(--text-muted)">${comp.note || 'N/A'}</span>`}</div>`;
      html += `<div>`;
      if (maxPrice && comp.price) {
        const pct = (comp.price / maxPrice * 100);
        html += `<div class="bar-container"><div class="bar ${barClass}" style="width:${pct}%"></div></div>`;
      }
      html += `</div>`;
      html += `<div class="hide-mobile"></div><div class="hide-mobile"></div><div></div>`;
      html += `</div>`;
    });

    // Stats summary
    html += `<div class="stats-row">`;
    html += `<div class="stat"><div class="label">Cheapest (Top 5)</div><div class="value green">${stats.min ? fmt(stats.min) : 'TBD'}</div></div>`;
    html += `<div class="stat"><div class="label">Average (Top 5)</div><div class="value">${stats.avg ? fmt(stats.avg) : 'TBD'}</div></div>`;
    html += `<div class="stat"><div class="label">Median (Top 5)</div><div class="value">${stats.median ? fmt(stats.median) : 'TBD'}</div></div>`;
    if (item.vivaPrice && stats.avg) {
      const diff = ((item.vivaPrice / stats.avg - 1) * 100).toFixed(0);
      const cls = diff > 10 ? 'red' : diff < -10 ? 'green' : 'yellow';
      html += `<div class="stat"><div class="label">Viva vs Average</div><div class="value ${cls}">${diff > 0 ? '+' : ''}${diff}%</div><div class="sub">${diff > 0 ? 'Above' : 'Below'} market average</div></div>`;
    }
    if (stats.position != null) {
      const cls = stats.position <= 2 ? 'green' : stats.position <= 4 ? 'yellow' : 'red';
      html += `<div class="stat"><div class="label">Viva Price Rank</div><div class="value ${cls}">#${stats.position}</div><div class="sub">of ${stats.count + 1} (lower = cheaper)</div></div>`;
    }
    html += `</div>`;

    html += `</div></div>`;
  });

  container.innerHTML = html;
  document.getElementById('dataStatus').textContent = `${items.length} products | Superdrug & VivaFem data pending`;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderProducts(btn.dataset.filter);
  });
});

renderProducts('all');
</script>
</body>
</html>
