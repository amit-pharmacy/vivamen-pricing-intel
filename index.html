const SALT_HEX = "18ebc99e5a195043a85c774c51571834";
const IV_HEX = "47fb20a09c53af0a9253a17c";
const ITERATIONS = 100000;
const BASE_PATH = "/vivamen-pricing-intel/"; // e.g. "/repo-name/" for project pages

function hex2buf(h){const a=new Uint8Array(h.length/2);for(let i=0;i<a.length;i++)a[i]=parseInt(h.substr(i*2,2),16);return a;}
function b642buf(b){const s=atob(b);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}

async function deriveKey(password){
  const baseKey = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt: hex2buf(SALT_HEX), iterations: ITERATIONS, hash:'SHA-256'},
    baseKey,
    {name:'AES-GCM', length: 256},
    false,
    ['decrypt']
  );
}

async function unlock(password){
  const key = await deriveKey(password);
  const ct = b642buf(BUNDLE_B64);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv: hex2buf(IV_HEX)}, key, ct);
  const json = new TextDecoder().decode(pt);
  return JSON.parse(json); // {path: contentString}
}

function pickFile(map){
  // Map relative URL path to a file in the bundle.
  let p = location.pathname;
  if (BASE_PATH && p.indexOf(BASE_PATH) === 0) p = p.slice(BASE_PATH.length - 1);
  if (p.endsWith('/') || p === '') p = '/index.html';
  const key = p.replace(/^\//, '');
  return map[key] || map['index.html'] || Object.values(map)[0];
}

document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.textContent = '';
  btn.disabled = true; btn.textContent = 'Unlocking...';
  try {
    const map = await unlock(document.getElementById('p').value);
    const content = pickFile(map);
    sessionStorage.setItem('_dms_unlocked', document.getElementById('p').value);
    document.open();
    document.write(content);
    document.close();
  } catch (ex) {
    btn.disabled = false; btn.textContent = 'Unlock';
    err.textContent = 'Wrong password.';
  }
});

// auto-unlock within the same tab session
(async () => {
  const cached = sessionStorage.getItem('_dms_unlocked');
  if (cached) {
    try {
      const map = await unlock(cached);
      const content = pickFile(map);
      document.open(); document.write(content); document.close();
    } catch (e) {
      sessionStorage.removeItem('_dms_unlocked');
    }
  }
})();
